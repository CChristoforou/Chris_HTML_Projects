<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0d30;
    --navy-mid: #0d1140;
    --blue: #1d2577;
    --blue-light: #e8eaf6;
    --white: #ffffff;
    --gray-bg: #f7f8fa;
    --gray-line: #dde1ea;
    --gray-mid: #8890a4;
    --gray-dark: #3a3f4a;
    --text: #111827;
    --radius: 6px;
    --accent: #1d2577;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #eef1f6;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .page {
    background: white;
    max-width: 900px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(10,13,48,0.14);
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header img { height: 44px; width: auto; display: block; }
  .header-title { text-align: right; }
  .header-title h1 { color: white; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-title p { color: #8899bb; font-size: 12px; margin-top: 3px; }

  /* BLUE STRIP */
  .strip { background: var(--blue); height: 3px; }

  /* BODY */
  .body { padding: 28px 36px 36px; }

  /* SECTION */
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--navy);
    text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1.5px solid var(--navy);
    margin-bottom: 14px;
  }

  /* META GRID */
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* FROM / TO */
  .party-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  .party-block { display: flex; flex-direction: column; gap: 8px; }

  /* FIELD */
  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .field-wrap label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    color: var(--gray-mid);
    text-transform: uppercase;
  }
  .field-wrap input,
  .field-wrap textarea,
  .field-wrap select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--gray-line);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--gray-dark);
    background: var(--gray-bg);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-wrap textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
  .field-wrap input:focus,
  .field-wrap textarea:focus,
  .field-wrap select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(29,37,119,0.1);
    background: white;
  }

  /* INVOICE META ROW */
  .inv-meta-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  /* ITEMS TABLE */
  .items-section { margin-bottom: 20px; }
  table.items {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
  }
  table.items thead tr {
    background: var(--navy);
  }
  table.items thead th {
    padding: 9px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8899bb;
    text-align: left;
  }
  table.items thead th:nth-child(2),
  table.items thead th:nth-child(3),
  table.items thead th:nth-child(4) { text-align: right; }
  table.items tbody tr { border-bottom: 1px solid var(--gray-line); }
  table.items tbody tr:nth-child(even) { background: var(--gray-bg); }
  table.items tbody td { padding: 6px 8px; vertical-align: middle; }
  table.items tbody td input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--gray-dark);
    background: transparent;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  table.items tbody td input:focus {
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 2px rgba(29,37,119,0.1);
  }
  table.items tbody td:nth-child(2) input,
  table.items tbody td:nth-child(3) input { text-align: right; }
  table.items tbody td:nth-child(4) {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gray-dark);
    text-align: right;
    padding-right: 12px;
    white-space: nowrap;
  }
  table.items tbody td:nth-child(5) { width: 36px; text-align: center; }
  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-mid);
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: #b13a3a; background: #fbeaea; }

  .add-btn {
    background: white;
    border: 1.5px dashed var(--blue);
    color: var(--blue);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--blue-light); }

  /* TOTALS */
  .totals-wrap {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 24px;
  }
  .totals-box {
    width: 280px;
    border: 1px solid var(--gray-line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--gray-line);
  }
  .totals-row:last-child {
    border-bottom: none;
    background: var(--navy);
    font-weight: 600;
    font-size: 15px;
    color: white;
  }
  .totals-row label { color: var(--gray-mid); font-size: 12px; }
  .totals-row:last-child label { color: #8899bb; font-size: 12px; font-weight: 400; }
  .totals-row span {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gray-dark);
  }
  .totals-row:last-child span { color: white; font-size: 15px; font-family: 'DM Mono', monospace; }

  /* TAX ROW */
  .tax-row { display: flex; align-items: center; gap: 6px; }
  .tax-row label { color: var(--gray-mid); font-size: 12px; }
  .tax-input {
    width: 58px;
    padding: 4px 6px;
    border: 1px solid var(--gray-line);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--gray-dark);
    background: var(--gray-bg);
    outline: none;
    text-align: right;
  }
  .tax-input:focus { border-color: var(--blue); background: white; }
  .tax-symbol { font-size: 12px; color: var(--gray-mid); }

  /* NOTES */
  .notes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* CURRENCY SELECTOR */
  .currency-select {
    padding: 4px 8px;
    border: 1px solid var(--gray-line);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--gray-dark);
    background: var(--gray-bg);
    outline: none;
    cursor: pointer;
  }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 20px 36px;
    background: var(--gray-bg);
    border-top: 1px solid var(--gray-line);
  }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-secondary { background: white; color: var(--gray-dark); border: 1px solid var(--gray-line); }
  .btn-secondary:hover { border-color: var(--gray-dark); }

  /* FOOTER */
  .footer {
    background: var(--navy);
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: #8899bb;
    letter-spacing: 0.04em;
  }

  /* PRINT */
  @page { margin: 6mm; size: A4; }
  @media print {
    body { background: white; padding: 0; font-size: 11px; }
    .page { box-shadow: none; border-radius: 0; max-width: 100%; }
    .actions { display: none !important; }
    .add-btn { display: none !important; }
    .del-btn { display: none !important; }
    .body { padding: 14px 20px 14px; }
    .section { margin-bottom: 10px; }
    .section-title { padding-bottom: 3px; margin-bottom: 8px; }
    .inv-meta-row { gap: 8px; margin-bottom: 10px; }
    .party-grid { gap: 12px; margin-bottom: 10px; }
    .party-block { gap: 4px; }
    .notes-grid { gap: 12px; margin-bottom: 10px; }
    .field-wrap { gap: 2px; }
    .field-wrap input,
    .field-wrap textarea,
    .field-wrap select {
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      padding: 2px 0;
      font-size: 11px;
    }
    .field-wrap textarea { min-height: 36px; }
    table.items tbody td input {
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      padding: 3px 6px;
      font-size: 11px;
    }
    table.items thead th { padding: 5px 8px; font-size: 9px; }
    table.items tbody td { padding: 3px 6px; }
    .tax-input, .currency-select {
      border: none !important;
      background: transparent !important;
    }
    .totals-wrap { margin-bottom: 10px; }
    .totals-box { width: 240px; }
    .totals-row { padding: 5px 10px; font-size: 11px; }
    .totals-row:last-child { font-size: 13px; }
    .header { padding: 12px 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .header img { height: 34px; }
    .strip { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .footer { padding: 6px; font-size: 10px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    table.items thead { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .totals-row:last-child { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <img src="https://raw.githubusercontent.com/CChristoforou/Chris_HTML_Projects/main/Invoice_Generator/Company_Logo.png" alt="Company Logo">
    <div class="header-title">
      <h1>Invoice</h1>
      <p>Fill in the details below and Save as PDF</p>
    </div>
  </div>
  <div class="strip"></div>

  <div class="body">

    <!-- INVOICE META -->
    <div class="section">
      <div class="section-title">Invoice Details</div>
      <div class="inv-meta-row">
        <div class="field-wrap">
          <label>Invoice No.</label>
          <input type="text" id="inv-number" value="INV-001">
        </div>
        <div class="field-wrap">
          <label>Invoice Date</label>
          <input type="date" id="inv-date">
        </div>
        <div class="field-wrap">
          <label>Due Date</label>
          <input type="date" id="inv-due">
        </div>
        <div class="field-wrap">
          <label>Currency</label>
          <select class="currency-select" id="currency" onchange="recalc()" style="width:100%;padding:8px 10px;font-size:13px;">
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
            <option value="A$">AUD (A$)</option>
            <option value="C$">CAD (C$)</option>
            <option value="¥">JPY (¥)</option>
            <option value="CHF">CHF</option>
          </select>
        </div>
      </div>
    </div>

    <!-- FROM / TO -->
    <div class="section">
      <div class="section-title">Parties</div>
      <div class="party-grid">
        <div class="party-block">
          <div style="font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">From</div>
          <div class="field-wrap"><label>Company / Your Name</label><input type="text" id="from-name" placeholder="e.g. Smith Consulting Ltd"></div>
          <div class="field-wrap"><label>Email</label><input type="email" id="from-email" placeholder="e.g. billing@example.com"></div>
          <div class="field-wrap"><label>Address</label><textarea id="from-address" placeholder="Street, City, Country"></textarea></div>
          <div class="field-wrap"><label>Tax / VAT Number</label><input type="text" id="from-tax" placeholder="e.g. GB123456789"></div>
        </div>
        <div class="party-block">
          <div style="font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Bill To</div>
          <div class="field-wrap"><label>Client Name</label><input type="text" id="to-name" placeholder="e.g. Acme Corporation"></div>
          <div class="field-wrap"><label>Email</label><input type="email" id="to-email" placeholder="e.g. accounts@client.com"></div>
          <div class="field-wrap"><label>Address</label><textarea id="to-address" placeholder="Street, City, Country"></textarea></div>
          <div class="field-wrap"><label>Tax / VAT Number</label><input type="text" id="to-tax" placeholder="e.g. EU987654321"></div>
        </div>
      </div>
    </div>

    <!-- LINE ITEMS -->
    <div class="section items-section">
      <div class="section-title">Line Items</div>
      <table class="items">
        <thead>
          <tr>
            <th style="width:42%;">Description</th>
            <th style="width:12%;">Qty</th>
            <th style="width:18%;">Unit Rate</th>
            <th style="width:20%;">Amount</th>
            <th style="width:8%;"></th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="add-btn" onclick="addRow()">+ Add Line Item</button>
    </div>

    <!-- TOTALS -->
    <div class="totals-wrap">
      <div class="totals-box">
        <div class="totals-row">
          <label>Subtotal</label>
          <span id="subtotal">0.00</span>
        </div>
        <div class="totals-row">
          <div class="tax-row">
            <label>Tax</label>
            <input type="number" class="tax-input" id="tax-rate" value="20" min="0" max="100" step="0.1" oninput="recalc()">
            <span class="tax-symbol">%</span>
          </div>
          <span id="tax-amount">0.00</span>
        </div>
        <div class="totals-row">
          <label>Total Due</label>
          <span id="total">0.00</span>
        </div>
      </div>
    </div>

    <!-- NOTES & PAYMENT -->
    <div class="section">
      <div class="section-title">Additional Information</div>
      <div class="notes-grid">
        <div class="field-wrap">
          <label>Payment Terms</label>
          <textarea id="payment-terms" placeholder="e.g. Payment due within 30 days of invoice date.&#10;Bank: Example Bank&#10;Account: 12345678&#10;Sort Code: 00-00-00&#10;IBAN: GB00EXMP00000012345678"></textarea>
        </div>
        <div class="field-wrap">
          <label>Notes</label>
          <textarea id="notes" placeholder="e.g. Thank you for your business. Please reference the invoice number when making payment."></textarea>
        </div>
      </div>
    </div>

  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">&#x2193; Save as PDF</button>
    <button class="btn btn-secondary" onclick="clearForm()">&#x21BA; Clear Form</button>
  </div>

  <div class="footer">Invoice Generator &nbsp;|&nbsp; Fill in · Save as PDF · Send</div>

</div>

<script>
let rowId = 0;

function getCurrency() {
  return document.getElementById('currency').value;
}

function addRow(desc='', qty=1, rate=0) {
  const id = ++rowId;
  const tr = document.createElement('tr');
  tr.id = 'row-' + id;
  tr.innerHTML = `
    <td><input type="text" placeholder="e.g. Consulting services" value="${desc}"></td>
    <td><input type="number" value="${qty}" min="0" step="1" style="width:60px;" oninput="recalc()"></td>
    <td><input type="number" value="${parseFloat(rate).toFixed(2)}" min="0" step="0.01" style="width:90px;" oninput="recalc()"></td>
    <td id="amt-${id}">0.00</td>
    <td><button class="del-btn" onclick="removeRow(${id})" title="Remove row">&#x2715;</button></td>
  `;
  document.getElementById('items-body').appendChild(tr);
  recalc();
}

function removeRow(id) {
  const el = document.getElementById('row-' + id);
  if (el) el.remove();
  recalc();
}

function recalc() {
  const sym = getCurrency();
  let sub = 0;
  document.querySelectorAll('#items-body tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input[type=number]');
    if (inputs.length < 2) return;
    const qty  = parseFloat(inputs[0].value) || 0;
    const rate = parseFloat(inputs[1].value) || 0;
    const amt  = qty * rate;
    sub += amt;
    const amtEl = tr.querySelector('[id^=amt-]');
    if (amtEl) amtEl.textContent = sym + amt.toFixed(2);
  });
  const taxRate = parseFloat(document.getElementById('tax-rate').value) || 0;
  const taxAmt  = sub * (taxRate / 100);
  const total   = sub + taxAmt;
  document.getElementById('subtotal').textContent   = sym + sub.toFixed(2);
  document.getElementById('tax-amount').textContent = sym + taxAmt.toFixed(2);
  document.getElementById('total').textContent      = sym + total.toFixed(2);
}

function clearForm() {
  document.querySelectorAll('input[type=text], input[type=email], textarea').forEach(el => el.value = '');
  document.getElementById('inv-number').value = 'INV-001';
  document.getElementById('tax-rate').value   = '20';
  document.getElementById('items-body').innerHTML = '';
  rowId = 0;
  setDates();
  addRow('', 1, 0);
  recalc();
}

function setDates() {
  const today = new Date();
  const fmt   = d => d.toISOString().split('T')[0];
  document.getElementById('inv-date').value = fmt(today);
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('inv-due').value = fmt(due);
}

setDates();
addRow('Consulting services', 10, 150.00);
addRow('Project setup fee',    1, 500.00);
addRow('',                     1,   0.00);
recalc();
</script>
</body>
</html>
